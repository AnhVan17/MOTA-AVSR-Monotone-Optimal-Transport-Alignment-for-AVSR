# AURORA-XT FINAL CONFIG
# ================================================
# Optimized to fix Test WER 55% → 18-25%
# 
# KEY CHANGES:
# - vocab_size: 220 → 51,865 (WhisperTokenizer)
# - CTC: REMOVED (ctc_weight=0.0)
# - Decoder: 4 layers → 6 layers (stronger LM)
# - d_model: 256 → 512 (more capacity)
# - Dropout: 0.1 → 0.2 (prevent overfitting)
# - Epochs: 20 → 30 (train longer)

# Model Architecture
model:
  # Input dimensions
  audio_dim: 768            # Whisper encoder output
  visual_dim: 512           # ResNet18 output
  
  # Architecture (OPTIMIZED)
  d_model: 512              # ← INCREASED from 256
  num_encoder_layers: 6     # Conformer layers
  num_decoder_layers: 6     # ← INCREASED from 4
  num_heads: 8              # ← INCREASED from 4
  
  # Tokenizer (WhisperTokenizer)
  vocab_size: 51865         # ← CRITICAL: Whisper multilingual vocab
  pad_token_id: 50257       # Whisper pad token
  bos_token_id: 50258       # <|startoftranscript|>
  eos_token_id: 50257       # <|endoftranscript|>
  
  # Regularization (STRONGER)
  dropout: 0.2              # ← INCREASED from 0.1

# Loss Configuration (ATTENTION-ONLY)
loss:
  ctc_weight: 0.0           # ← REMOVED CTC!
  ce_weight: 1.0            # ← Pure attention

# Data Configuration
data:
  train_manifest: "./data/manifests/train.jsonl"
  val_manifest: "./data/manifests/val.jsonl"
  data_root: "./data"
  
  batch_size: 24            # ← Reduced from 32 (larger model)
  num_workers: 4

  max_train_samples: null
  max_val_samples: null

# Training Configuration (OPTIMIZED)
training:
  # Duration
  num_epochs: 30            
  # Learning rate (CONSERVATIVE)
  learning_rate: 1e-4       
  min_lr: 1e-7
  
  # Regularization (STRONGER)
  weight_decay: 0.05        
  gradient_clip: 1.0        
  label_smoothing: 0.15     
  
  # Optimization
  use_amp: true
  accumulation_steps: 6     
  warmup_ratio: 0.15

# Evaluation
max_eval_batches: 30        # More thorough evaluation

# Logging & Checkpointing
use_wandb: true
wandb_project: "aurora-xt-vietnamese"
wandb_run: "final_whisper_attn_only"
checkpoint_dir: "./checkpoints/final"


seed: 42

