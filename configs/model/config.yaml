# AURORA-XT Phase A Configuration
# Baseline: Whisper + ResNet18 + Conformer + Hybrid Decoder
# Model Architecture
model:
  audio_dim: 768            
  visual_dim: 512            
  d_model: 256                
  num_encoder_layers: 6       
  num_decoder_layers: 4       
  num_heads: 4                
  vocab_size: 121            
  dropout: 0.1

# Loss Configuration
loss:
  ctc_weight: 0.3             
  ce_weight: 0.7              

# Data Configuration
data:
  train_manifest: "./data/manifests/train.jsonl"
  val_manifest: "./data/manifests/val.jsonl"
  data_root: "./data"
  batch_size: 32              
  num_workers: 4

  max_train_samples: null     
  max_val_samples: 100        

# Training Configuration
training:
  num_epochs: 20             
  learning_rate: 3e-4         
  min_lr: 1e-6                
  weight_decay: 0.01          
  gradient_clip: 5.0         
  
  # Optimization
  use_amp: true              

# Evaluation
max_eval_batches: 20          

# Logging & Checkpointing
use_wandb: true
wandb_project: "aurora-xt-vietnamese"
wandb_run: "phase_a_baseline"
checkpoint_dir: "./checkpoints/phase_a"

