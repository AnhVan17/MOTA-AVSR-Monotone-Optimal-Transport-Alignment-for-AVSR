# AURORA-XT Phase 1 Configuration
# Baseline: Whisper (Frozen) + ResNet18 (Frozen) + Conformer + Hybrid Decoder
# Goal: Stabilize training, learn coarse fusion (QualityGate)

model:
  audio_dim: 768            # Whisper encoder output
  visual_dim: 512           # ResNet18 output
  d_model: 256
  num_encoder_layers: 4
  num_decoder_layers: 2
  num_heads: 4
  vocab_size: 51866         # Whisper Tokenizer Vocab
  dropout: 0.1
  use_mqot: false           # Phase 1: QualityGate only

loss:
  ctc_weight: 0.3
  ce_weight: 0.7

data:
  train_manifest: "/mnt/manifests/grid_manifest.jsonl"
  val_manifest: "/mnt/manifests/grid_manifest.jsonl" # TODO: Split validation
  data_root: "/mnt/processed_features/grid"
  batch_size: 32
  num_workers: 2
  use_precomputed_features: true
  max_samples: null

training:
  num_epochs: 10
  learning_rate: 1e-4
  min_lr: 1e-6
  weight_decay: 0.01
  gradient_clip: 5.0
  use_amp: true

# Feature Augmentation (On-the-fly)
augmentation:
  # Audio (SpecAugment-like)
  time_mask_param: 10
  freq_mask_param: 64
  noise_std: 0.01
  prob: 0.5           # 50% chance

  # Visual (Feature Space)
  dropout_prob: 0.1
  frame_mask_param: 5
  visual_prob: 0.3    # 30% chance (Safety)

logging:
  use_wandb: false
  checkpoint_dir: "/mnt/checkpoints/phase1"
